<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>404 | Page Not Found</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { text-align: center; padding: 150px; font-family: Arial, sans-serif; }
        h1 { font-size: 50px; color: black; }
        p { color: black; }
        body { font-size: 20px; color: #333; }
        a { color: #007bff; text-decoration: none; }
        <style>
  .btn-brilhante {
    padding: 15px 30px;
    font-size: 18px;
    color: white;
    background-color: #6200ea; /* Cor de fundo original */
    border: none;
    border-radius: 50px;
    cursor: pointer;
    
    /* Transição suave para todas as propriedades */
    transition: all 0.3s ease; 
    
    /* Sombras iniciais leves */
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
  }

  /* Efeito ao passar o mouse (Hover) */
  .btn-brilhante:hover {
    /* Aumenta o tamanho em 10% */
    transform: scale(1.1);
    
    /* Adiciona o efeito de brilho (Neon) */
    box-shadow: 0 0 15px #9d4eff, 0 0 30px #9d4eff, 0 0 45px #9d4eff;
    
    /* Opcional: altera a cor de fundo no hover */
    background-color: #7b1fa2;
  }
</style>
    </style>
</head>
<body>
    <h1>404 | Page Not Found</h1>
    <p>Sorry, the page you are looking for does not exist or has been moved.</p>
    <p><a href="index.html">Return to home</a></p>
</body>
</html>
